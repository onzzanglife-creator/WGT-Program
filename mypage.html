<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WGT — 마이페이지</title>

  <script>
    (function() {
        var userAgent = navigator.userAgent.toLowerCase();
        // 현재 브라우저가 카카오톡인지 확인
        if (userAgent.indexOf('kakaotalk') > -1) {
            // 안드로이드 폰인 경우 크롬으로 강제 전환
            if (userAgent.indexOf('android') > -1) {
                location.href = 'intent://' + location.href.replace(/https?:\/\//i, '') + '#Intent;scheme=http;package=com.android.chrome;end';
            }
            // 아이폰(iOS)인 경우 Safari로 전환
            else if (userAgent.indexOf('iphone') > -1 || userAgent.indexOf('ipad') > -1) {
                location.href = 'ftp://' + location.href.replace(/https?:\/\//i, '');
            }
        }
    })();
  </script>

  <link rel="stylesheet" href="css/style.css">
</head>
<body class="dashboard-page app-shell">

<!-- 상단 바 -->
<div class="topbar">
  <div class="brand">WGT Program by Alice</div>
  <div class="topbar-right">
    <button class="btn-logout" onclick="signOut()">로그아웃</button>
  </div>
</div>

<!-- 본문 -->
<div class="app-content">

  <!-- 프로필 -->
  <div class="profile">
    <div class="avatar" id="mp-initial">학</div>
    <div>
      <div class="pname"><span id="mp-name">학생</span></div>
      <div class="pmeta" data-profile-meta>Lv.7 · 새싹 단계</div>
    </div>
  </div>

  <!-- 성장 카드 (예시값 — 추후 학습 기록 연동) -->
  <div class="growth-card">
    <div class="growth-top">
      <div class="growth-left">
        <div class="lv-badge"><small>LV</small><b>7</b></div>
        <div>
          <div class="growth-stage-name">새싹 단계</div>
          <div class="growth-xp">다음 단계까지 180 XP</div>
        </div>
      </div>
      <div class="growth-pct">64<span>%</span></div>
    </div>
    <div class="growth-bar"><i style="width:64%"></i></div>
    <div class="growth-stages">
      <div class="gs done"><span></span><small>씨앗</small></div>
      <div class="gs cur"><span></span><small>새싹</small></div>
      <div class="gs"><span></span><small>잎</small></div>
      <div class="gs"><span></span><small>나무</small></div>
      <div class="gs"><span></span><small>숲</small></div>
    </div>
  </div>

  <!-- 통계 타일 -->
  <div class="stat-row">
    <div class="stat-tile"><b data-stat="sentences">342</b><small>학습한 문장</small></div>
    <div class="stat-tile"><b data-stat="accuracy">88<span>%</span></b><small>평균 정답률</small></div>
    <div class="stat-tile dark"><b data-stat="streak">12</b><small>연속 학습</small></div>
  </div>

  <!-- 형식별 진도 -->
  <div class="sec-title">형식별 진도</div>
  <div class="growth-card" style="margin-bottom:0">
    <div class="prog-row" data-pattern="1"><b>1형식</b><div class="bar"><i style="width:92%;background:#3B82F6"></i></div><em>92%</em></div>
    <div class="prog-row" data-pattern="2"><b>2형식</b><div class="bar"><i style="width:74%;background:#8B5CF6"></i></div><em>74%</em></div>
    <div class="prog-row" data-pattern="3"><b>3형식</b><div class="bar"><i style="width:45%;background:#22C55E"></i></div><em>45%</em></div>
    <div class="prog-row" data-pattern="4"><b>4형식</b><div class="bar"><i style="width:18%;background:#EC4899"></i></div><em>18%</em></div>
    <div class="prog-row" data-pattern="5"><b>5형식</b><div class="bar"><i style="width:6%;background:#F59E0B"></i></div><em>6%</em></div>
  </div>

  <!-- 배지 -->
  <div class="sec-title">획득한 배지</div>
  <div class="badge-grid">
    <div class="badge-item" data-badge="first">
      <div class="ic green"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#6B8A0E" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"/></svg></div>
      <small>첫 문장</small>
    </div>
    <div class="badge-item" data-badge="streak">
      <div class="ic dark">7</div>
      <small>7일 연속</small>
    </div>
    <div class="badge-item" data-badge="p1">
      <div class="ic green"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#6B8A0E" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2l2.4 7.4H22l-6 4.5 2.3 7.1-6.3-4.6-6.3 4.6L7.9 13.9 2 9.4h7.6z"/></svg></div>
      <small>1형식 완성</small>
    </div>
    <div class="badge-item" data-badge="review">
      <div class="ic green"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#6B8A0E" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 2l4 4-4 4"/><path d="M3 11V9a4 4 0 014-4h14"/><path d="M7 22l-4-4 4-4"/><path d="M21 13v2a4 4 0 01-4 4H3"/></svg></div>
      <small>복습왕</small>
    </div>
  </div>

</div>

<!-- 하단 탭바 -->
<nav class="tabbar">
  <div class="tabbar-inner">
    <a class="tab" href="dashboard.html">
      <svg viewBox="0 0 24 24"><path d="M3 10.5L12 3l9 7.5"/><path d="M5 9.5V20h14V9.5"/></svg>
      홈
    </a>
    <a class="tab" href="player.html?pattern=1">
      <svg viewBox="0 0 24 24"><path d="M4 5a2 2 0 012-2h6v16H6a2 2 0 00-2 2V5z"/><path d="M20 5a2 2 0 00-2-2h-6v16h6a2 2 0 012 2V5z"/></svg>
      학습
    </a>
    <a class="tab active" href="mypage.html">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M4 21c0-4 3.5-6 8-6s8 2 8 6"/></svg>
      마이
    </a>
  </div>
</nav>

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<script src="js/firebase-config.js"></script>
<script src="js/auth.js"></script>
<script src="js/wgt-stats.js"></script>
<script>
  // 로그인/접근 권한 가드 (대시보드와 동일 로직 재사용)
  watchAuthOnDashboard();

  // 프로필에 로그인한 학생 이름 표시
  firebase.auth().onAuthStateChanged(function(u) {
    if (u) {
      var n = (u.displayName || '').trim();
      var first = n ? n.split(' ')[0] : '학생';
      var nameEl = document.getElementById('mp-name');
      var initEl = document.getElementById('mp-initial');
      if (nameEl) nameEl.textContent = first;
      if (initEl) initEl.textContent = first.charAt(0) || '학';
    }
  });
</script>

</body>
</html>
