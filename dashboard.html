<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WGT Generator — 대시보드</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="dashboard-page">

<!-- 상단 바 -->
<div class="topbar">
  <div class="brand">WGT Program by Alice</div>
  <div class="topbar-right">
    <span id="user-name"></span>
    <button class="btn-logout" onclick="signOut()">로그아웃</button>
  </div>
</div>

<!-- 본문 -->
<div class="dashboard-body">

  <div class="card-grid">

    <div class="gen-card" id="toggle-card" onclick="toggleSubCards()">
      <h2>5형식 마스터</h2>
      <span class="card-arrow">▼</span>
    </div>

    <div class="gen-card" onclick="alert('준비 중입니다.')">
      <h2>영어내신 마스터</h2>
    </div>

    <div class="gen-card" style="opacity:.5; cursor:default;">
      <h2>Coming Soon</h2>
    </div>

  </div>

  <!-- 5형식 서브 카드 (토글) -->
  <div id="sub-cards-wrap" class="sub-cards-wrap">
    <div class="sub-cards-grid">

      <div class="gen-card gen-card-sub" onclick="location.href='player.html?pattern=1'">
        <div class="card-icon">1️⃣</div>
        <h2>1형식 <span class="pattern-label">SV</span></h2>
        <p>주어 + 동사</p>
      </div>

      <div class="gen-card gen-card-sub" onclick="location.href='player.html?pattern=2'">
        <div class="card-icon">2️⃣</div>
        <h2>2형식 <span class="pattern-label">SVC</span></h2>
        <p>주어 + 동사 + 보어</p>
      </div>

      <div class="gen-card gen-card-sub" onclick="location.href='player.html?pattern=3'">
        <div class="card-icon">3️⃣</div>
        <h2>3형식 <span class="pattern-label">SVO</span></h2>
        <p>주어 + 동사 + 목적어</p>
      </div>

      <div class="gen-card gen-card-sub" onclick="location.href='player.html?pattern=4'">
        <div class="card-icon">4️⃣</div>
        <h2>4형식 <span class="pattern-label">SVOO</span></h2>
        <p>주어 + 동사 + 간목 + 직목</p>
      </div>

      <div class="gen-card gen-card-sub" onclick="location.href='player.html?pattern=5'">
        <div class="card-icon">5️⃣</div>
        <h2>5형식 <span class="pattern-label">SVOC</span></h2>
        <p>주어 + 동사 + 목적어 + 목적보어</p>
      </div>

    </div>
  </div>

</div>

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<script src="js/firebase-config.js"></script>
<script src="js/auth.js"></script>
<script>
  watchAuthOnDashboard();

  function toggleSubCards() {
    var wrap = document.getElementById('sub-cards-wrap');
    var card = document.getElementById('toggle-card');
    wrap.classList.toggle('open');
    card.classList.toggle('open');
  }
</script>

</body>
</html>
