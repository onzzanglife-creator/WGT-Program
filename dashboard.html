<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WGT Generator — 대시보드</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<!-- 상단 바 -->
<div class="topbar">
  <div class="brand">WGT Generator</div>
  <div class="topbar-right">
    <span id="user-name"></span>
    <button class="btn-logout" onclick="signOut()">로그아웃</button>
  </div>
</div>

<!-- 본문 -->
<div class="dashboard-body">
  <h1>어떤 파일을 생성할까요?</h1>
  <p>생성할 프로그램 유형을 선택하세요.</p>

  <div class="card-grid">

    <div class="gen-card" onclick="location.href='player.html?pattern=1'">
      <div class="card-icon">📚</div>
      <h2>5형식 마스터 프로그램</h2>
      <p>1~5형식 문장 패턴 드래그&드롭 훈련 파일 생성</p>
    </div>

    <div class="gen-card" onclick="alert('준비 중입니다.')">
      <div class="card-icon">📝</div>
      <h2>모의고사 WGT</h2>
      <p>교과서 / 모의고사 지문 기반 어순 훈련 파일 생성</p>
    </div>

    <div class="gen-card" style="opacity:.6; cursor:default;">
      <div class="card-icon">➕</div>
      <h2>더 많은 유형</h2>
      <p>새로운 생성기가 추가될 예정입니다.</p>
      <span class="badge-coming">Coming Soon</span>
    </div>

  </div>
</div>

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<script src="js/firebase-config.js"></script>
<script src="js/auth.js"></script>
<script>
  watchAuthOnDashboard();
</script>

</body>
</html>
